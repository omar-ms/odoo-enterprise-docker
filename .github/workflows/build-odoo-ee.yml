name: Build Odoo Enterprise Image

on:
  workflow_dispatch:
    inputs:
      odoo_version:
        description: "Odoo version"
        required: true
        default: "19.0"
        type: choice
        options:
          - "19.0"
          - "18.0"
          - "17.0"

      image_registry:
        description: "Registry host"
        required: true
        default: "docker.io"
        type: choice
        options:
          - "docker.io"
          - "ghcr.io"
          - "registry.gitlab.com"
          - "quay.io"
          - "registry.digitalocean.com"

      image_repository:
        description: "Registry repository, example: username/odoo-ee"
        required: true

      image_tag:
        description: "Image tag. Leave empty to use Odoo version."
        required: false
        default: ""

  schedule:
    # Daily at 12:30 AM (UTC+3) => 9:30 PM UTC
    - cron: "30 21 * * *"

jobs:
  build:
    name: Build Odoo Enterprise Docker image
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    # Manual runs always work.
    # Scheduled runs only run when repository variable SCHEDULE_ENABLED=true.
    if: ${{ github.event_name != 'schedule' || vars.SCHEDULE_ENABLED == 'true' }}

    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    env:
      ODOO_VERSION: ${{ inputs.odoo_version || vars.ODOO_VERSION || '' }}
      IMAGE_REGISTRY: ${{ inputs.image_registry || vars.IMAGE_REGISTRY || '' }}
      IMAGE_REPOSITORY: ${{ inputs.image_repository || vars.IMAGE_REPOSITORY || '' }}
      IMAGE_TAG_INPUT: ${{ inputs.image_tag || vars.IMAGE_TAG || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required config
        run: |
          if [ -z "$ODOO_VERSION" ]; then
            echo "ODOO_VERSION is required."
            exit 1
          fi

          if [ -z "$IMAGE_REGISTRY" ]; then
            echo "IMAGE_REGISTRY is required."
            exit 1
          fi

          if [ -z "$IMAGE_REPOSITORY" ]; then
            echo "IMAGE_REPOSITORY is required."
            echo "Example: your-dockerhub-username/odoo-ee"
            exit 1
          fi

      - name: Show selected config
        run: |
          echo "Odoo version: $ODOO_VERSION"
          echo "Image registry: $IMAGE_REGISTRY"
          echo "Image repository: $IMAGE_REPOSITORY"
          echo "Image tag input: $IMAGE_TAG_INPUT"

      - name: Show runner disk before cleanup
        run: |
          df -h
          docker system df || true

      - name: Free disk space on GitHub runner
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          docker system prune -a -f || true
          df -h

      - name: Prepare image names
        run: |
          IMAGE_TAG="${IMAGE_TAG_INPUT:-$ODOO_VERSION}"
          LOCAL_IMAGE="odoo-ee:${IMAGE_TAG}"

          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "LOCAL_IMAGE=$LOCAL_IMAGE" >> "$GITHUB_ENV"

          echo "Resolved image tag: $IMAGE_TAG"
          echo "Local image: $LOCAL_IMAGE"

          if [ "$IMAGE_REPOSITORY" = "CHANGE_ME/odoo-ee" ]; then
            echo "Please replace IMAGE_REPOSITORY."
            exit 1
          fi

          REGISTRY_IMAGE="${IMAGE_REGISTRY%/}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"

          echo "REGISTRY_IMAGE=$REGISTRY_IMAGE" >> "$GITHUB_ENV"
          echo "Registry image: $REGISTRY_IMAGE"

      - name: Validate registry credentials
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          if [ -z "$IMAGE_REGISTRY" ]; then
            echo "IMAGE_REGISTRY could not be resolved."
            exit 1
          fi

          if [ -z "$REGISTRY_USERNAME" ]; then
            echo "REGISTRY_USERNAME secret is required."
            exit 1
          fi

          if [ -z "$REGISTRY_TOKEN" ]; then
            echo "REGISTRY_TOKEN secret is required."
            exit 1
          fi

          echo "Registry credentials are configured for: $IMAGE_REGISTRY"

      - name: Login to container registry
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          echo "$REGISTRY_TOKEN" | docker login "$IMAGE_REGISTRY" \
            --username "$REGISTRY_USERNAME" \
            --password-stdin

      - name: Show build tools
        run: |
          docker version
          python3 --version

      - name: Create Odoo subscription key file
        run: |
          printf "%s" "${{ secrets.ODOO_SUBSCRIPTION_KEY }}" > ./odoo-sub-key.txt
          chmod 600 ./odoo-sub-key.txt

      - name: Build Odoo Enterprise image
        run: |
          python3 build.py \
            --yes \
            --sub-key-file ./odoo-sub-key.txt \
            --odoo-version "$ODOO_VERSION" \
            --image-name "$LOCAL_IMAGE" \
            --no-push

      - name: Show Docker usage after build
        run: |
          docker images
          docker system df
          df -h

      - name: Tag image for registry
        run: |
          docker tag "$LOCAL_IMAGE" "$REGISTRY_IMAGE"

      - name: Push image to registry
        run: |
          docker push "$REGISTRY_IMAGE"

      - name: Clean sensitive files
        if: always()
        run: |
          rm -f ./odoo-sub-key.txt
          rm -f ./odoo_enterprise.deb
          rm -f ./*.backup-*
          rm -f deb/*.download || true

      - name: Cleanup Docker
        if: always()
        run: |
          docker system prune -a -f || true

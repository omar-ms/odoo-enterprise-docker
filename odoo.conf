[options]
; NOTE: This configuration is maintained for Odoo 19.0 and uses current
; option names after deprecated settings were updated. For Odoo 18.0 or 17.0
; images, compare with the matching official Odoo Docker reference config:
; https://github.com/odoo/docker/tree/master

addons_path = /mnt/extra-addons
data_dir = /var/lib/odoo

; admin_passwd = admin
; csv_internal_sep = ,

; Database
; db_host =
; db_port =
; db_user =
; db_password =
; db_name =
; db_template = template0
; dbfilter =
; db_maxconn = 64
; db_sslmode = prefer
; db_app_name = odoo-{pid}

; HTTP / reverse proxy
; http_enable = True
; http_interface = 0.0.0.0
; http_port = 8069
; gevent_port = 8072
; proxy_mode = False
; x_sendfile = False

; Security
; list_db = True

; Logging
; log_level = info
; log_handler = :INFO
; log_db =
; log_db_level = warning
; logfile =
; syslog = False

; Email / SMTP
; email_from =
; from_filter =
; smtp_server = localhost
; smtp_port = 25
; smtp_ssl = False
; smtp_user =
; smtp_password =
; smtp_ssl_certificate_filename =
; smtp_ssl_private_key_filename =

; Workers / performance
; workers = 0
; max_cron_threads = 2
; limit_memory_soft = 2147483648
; limit_memory_hard = 2684354560
; limit_memory_soft_gevent =
; limit_memory_hard_gevent =
; limit_request = 65536
; limit_time_cpu = 60
; limit_time_real = 120
; limit_time_real_cron = -1
; limit_time_worker_cron = 0

; Temporary models / wizards
; transient_age_limit = 1.0
; osv_memory_count_limit = 0

; Developer mode
; dev_mode =

; GeoIP
; geoip_city_db = /usr/share/GeoIP/GeoLite2-City.mmdb
; geoip_country_db = /usr/share/GeoIP/GeoLite2-Country.mmdb

; Websocket
; websocket_keep_alive_timeout = 3600
; websocket_rate_limit_burst = 10
; websocket_rate_limit_delay = 0.2
